<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VIJAY ChatBot</title>
  <style>
    :root{
      --bg:#0b1020; --panel:#0f1724; --accent:#10a37f; --muted:#94a3b8;
      --user:#134e4a; --bot:#0f1724; --bubble-user:#0ea5a1; --bubble-bot:#111827;
      --max-w:900px;
    }
    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;background:linear-gradient(180deg,#071027 0%, #071226 100%);color:#e6eef6}
    .app{max-width:var(--max-w);margin:32px auto;border-radius:12px;overflow:hidden;display:grid;grid-template-columns:240px 1fr;box-shadow:0 10px 30px rgba(2,6,23,.6)}
    .sidebar{background:linear-gradient(180deg,#071026,#0b1424);padding:20px;color:var(--muted);display:flex;flex-direction:column;gap:16px}
    .brand{display:flex;align-items:center;gap:12px;color:#ecfbf6;font-weight:700;font-size:16px}
    .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px rgba(16,163,127,.6)}
    .conversations{flex:1;overflow:auto;padding-right:6px}
    .conv-item{padding:10px;border-radius:8px;color:#cfece7;background:transparent;cursor:pointer}
    .conv-item:hover{background:rgba(255,255,255,0.02)}
    .new-btn{margin-top:8px;padding:8px;border-radius:8px;background:linear-gradient(90deg,#072028,#0b2330);color:var(--accent);border:1px solid rgba(255,255,255,0.03);cursor:pointer}
    .main{background:var(--panel);display:flex;flex-direction:column;min-height:520px}
    .header{padding:18px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:12px}
    .header h1{margin:0;font-size:18px;color:#f1fff9}
    .chat{padding:18px;flex:1;overflow:auto;display:flex;flex-direction:column;gap:12px}
    .bubble{max-width:78%;padding:12px 14px;border-radius:12px;line-height:1.4;white-space:pre-wrap}
    .from-user{align-self:flex-end;background:linear-gradient(180deg,var(--bubble-user),#0ea89b);color:#01201e;border-bottom-right-radius:4px}
    .from-bot{align-self:flex-start;background:linear-gradient(180deg,var(--bubble-bot),#0b1120);color:#e6eef6;border-bottom-left-radius:4px;border:1px solid rgba(255,255,255,0.02)}
    .composer{display:flex;gap:8px;padding:12px;border-top:1px solid rgba(255,255,255,0.02);align-items:end}
    textarea#msg{flex:1;min-height:44px;max-height:140px;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;resize:none;font-size:14px}
    button.send{background:linear-gradient(90deg,var(--accent),#06b88a);border:none;color:#02261f;padding:10px 14px;border-radius:10px;cursor:pointer;font-weight:600}
    .meta{font-size:12px;color:var(--muted);padding:8px 18px;border-top:1px solid rgba(255,255,255,0.01)}
    .small{font-size:12px;color:var(--muted)}
    .placeholder{color:var(--muted);text-align:center;padding-top:40px}
    @media(max-width:820px){.app{grid-template-columns:1fr; margin:12px} .sidebar{display:none}}
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="VIJAY ChatBot">
    <aside class="sidebar" aria-hidden="false">
      <div class="brand"><span class="dot" aria-hidden="true"></span> VIJAY ChatBot</div>
      <div class="conversations" id="conversations">
        <div class="conv-item">New chat</div>
      </div>
      <button class="new-btn" id="newChat">+ New chat</button>
      <div class="small" style="margin-top:8px">Local demo • No auth in UI</div>
    </aside>

    <main class="main">
      <div class="header">
        <h1>VIJAY ChatBot</h1>
        <div style="margin-left:auto" class="small">Model: default</div>
      </div>

      <section class="chat" id="chat" aria-live="polite">
        <div class="placeholder" id="placeholder">
          Ask anything — I am VIJAY, your assistant.
        </div>
      </section>

      <div class="composer" role="form" aria-label="Message composer">
        <textarea id="msg" placeholder="Type a message and press Enter" ></textarea>
        <button class="send" id="sendBtn" aria-label="Send message">Send</button>
      </div>

      <div class="meta">Responses powered by the app backend</div>
    </main>
  </div>

  <script>
    // Keep the same fetch contract: POST /chat with JSON { message: msg }, expect { reply: "..." }
    const chatEl = document.getElementById('chat');
    const msgEl = document.getElementById('msg');
    const sendBtn = document.getElementById('sendBtn');
    const placeholder = document.getElementById('placeholder');
    const convs = document.getElementById('conversations');
    const newChat = document.getElementById('newChat');

    function appendBubble(text, from='bot') {
      if (placeholder) { placeholder.style.display = 'none'; }
      const el = document.createElement('div');
      el.className = 'bubble ' + (from === 'user' ? 'from-user' : 'from-bot');
      el.textContent = text;
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function send() {
      const msg = msgEl.value.trim();
      if(!msg) return;
      appendBubble(msg, 'user');
      msgEl.value = '';
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({message: msg})
        });

        if(!res.ok){
          appendBubble('Error: ' + res.status + ' ' + res.statusText, 'bot');
        } else {
          const data = await res.json();
          // support both data.reply and data.response for compatibility
          const reply = data.reply ?? data.response ?? 'No reply';
          appendBubble(reply, 'bot');
        }
      } catch (err) {
        appendBubble('Network error: ' + err.message, 'bot');
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
      }
    }

    // Events
    sendBtn.addEventListener('click', send);
    msgEl.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    newChat.addEventListener('click', () => {
      chatEl.innerHTML = '';
      if (placeholder) { placeholder.style.display = ''; }
    });

    // Populate conv list click (simple demo)
    convs.addEventListener('click', (e) => {
      if(e.target.classList.contains('conv-item')){
        chatEl.innerHTML = '';
        if (placeholder) { placeholder.style.display = ''; }
      }
    });
  </script>
</body>
</html>
